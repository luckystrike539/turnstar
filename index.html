<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>招寶539</title>
  <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" rel="stylesheet"/>
  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .bg-image {
      filter: blur(3px);
      -webkit-filter: blur(3px);
      height: 100%;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -1;
      opacity: 0.9;
    }
    .content-wrapper {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .logo-container {
      margin-bottom: 30px;
      display: inline-block;
    }
    .logo-image {
      max-width: 450px;
      max-height: 450px;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    .button-image-link {
      display: inline-block;
      animation: floatAnimation 3s ease-in-out infinite;
      cursor: pointer;
      text-decoration: none; /* 移除超連結下劃線 */
    }
    .click-add-image {
      max-width: 280px;
      height: auto;
      transition: transform 0.3s ease;
    }
    .button-image-link:hover .click-add-image {
      transform: scale(1.05);
    }
    .image-container {
      position: relative;
      display: inline-block;
    }
    .image-container img {
      display: block;
      width: 100%;
      height: auto;
    }
    .overlay-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      padding: 10px;
      width: 16em;
      word-wrap: break-word;
    }
    .overlay-text h3 {
      white-space: pre-wrap;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5); /* 增加文字辨識度 */
    }
    .buttons-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .hidden {
      display: none;
    }

    /* 響應式調整 */
    @media (max-width: 768px) {
      .logo-image { max-width: 350px; max-height: 350px; }
      .click-add-image { max-width: 300px; }
    }
    @media (max-width: 576px) {
      .logo-image { max-width: 300px; max-height: 300px; }
      .click-add-image { max-width: 250px; }
    }
    @keyframes floatAnimation {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&amp;display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="bg-image" id="bg-div" style="background-image: url('image/2c50ccc4688ab52c076267c8ef97a6b3.jpg?v=1775719328');"></div>

  <div class="content-wrapper container">
    <div class="logo-container">
      <img alt="Logo" class="logo-image img-fluid" id="logo-image" src="image/9494.png?v=1774944040"/>
    </div>

    <div class="buttons-container">
      <a class="button-image-link" href="https://line.me/ti/p/hVcbWqp5Ja" id="button-link-1">
        <div class="image-container">
          <img alt="按鈕 1" class="click-add-image img-fluid" id="button-image-1" src="image/1111.png?v=1774944010"/>
          <span class="overlay-text">
            <h3 id="button-label-1" style="color: #ffffff;">招寶539</h3>
          </span>
        </div>
      </a>
    </div>
  </div>

  <script crossorigin="anonymous" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
